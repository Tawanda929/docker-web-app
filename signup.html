<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="style.css">
    <title>Nix | Registration</title>
</head>
<body>
    <div class="wrapper">
    <nav class="nav">
        <div class="nav-logo">
            <p>NIKTECH</p>
        </div>
        <div class="nav-menu">
            <ul>
                <li><a href="index.html" class="link">Home</a></li>
                <li><a href="about.html" class="link">About</a></li>
                <li><a href="services.html" class="link">Services</a></li>
                <li><a href="contacts.html" class="link">Contacts</a></li>
            </ul>
        </div>
        <div class="nav-button">
           <button class="btn white-btn" id="loginbtn"><a href="index.html" class="link">Login</a></button>
            <button class="btn" id="registerbtn"><a href="signup.html" class="link">Sign up</a></button>
        </div>
        <i class="bx bx-menu"></i>
    </nav>

<!-------------------The Form---------------------->
        <div class="form-box">
<!---------------Registration Form------------->
            <div class="register-container" id="register">
                <div class="top">
                    <span>Have an account? <a href="index.html" onclick="login()">Login Here</a></span>
                    <header>Sign up</header>
                </div>
                <div class="two-forms">
                    <div class="input-box">
                        <input type="text" class="input-field" placeholder="Firstname">
                        <i class="bx bx-user"></i>
                    </div>
                    <div class="input-box">
                        <input type="text" class="input-field" placeholder="Lastname">
                        <i class="bx bx-user"></i>
                    </div>
                </div>
                 <div class="input-box">
                    <input type="text" class="input-field" placeholder="Email">
                    <i class="bx bx-envelope"></i>
                </div>
                <div class="input-box">
                    <input type="password" class="input-field" placeholder="Password">
                    <i class="bx bx-lock-alt"></i>
              </div>
              <div class="input-box">
                    <input type="submit" class="submit" value="Register">
              </div>
              <div class="two-col">
                <div class="one">
                    <input type="checkbox" id="register-check">
                    <label for="register-check"> Remember me</label>
                </div>
                <div class="two">
                    <label><a href="#">Terms & conditions</a></label>
                </div>
              </div>
            </div>  
        </div>
    </div>
    </body>
</html>
